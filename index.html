<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>한글 낱말 맞추기</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ea;
      --ink: #23302d;
      --muted: #66726d;
      --panel: #fffdfa;
      --line: #d8d0c0;
      --primary: #2766c3;
      --primary-dark: #16427f;
      --green: #249667;
      --pink: #e95f8c;
      --orange: #ef8b2c;
      --teal: #159aa5;
      --gold-dark: #b67814;
      --soft-green: #e8f8ee;
      --soft-red: #ffe2d5;
      --good: #206b3f;
      --bad: #9d2d24;
      --shadow: 0 18px 45px rgba(47, 54, 77, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      background:
        radial-gradient(circle at 10% 8%, rgba(255, 206, 84, 0.46), transparent 28rem),
        radial-gradient(circle at 90% 16%, rgba(106, 207, 255, 0.34), transparent 24rem),
        radial-gradient(circle at 18% 92%, rgba(255, 130, 170, 0.24), transparent 26rem),
        linear-gradient(150deg, #fff8e8 0%, #f1fbff 48%, #f5f0ff 100%);
      color: var(--ink);
      letter-spacing: 0;
    }

    button {
      font: inherit;
      color: inherit;
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 1120px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 2px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 56px;
      height: 56px;
      flex: 0 0 auto;
      filter: drop-shadow(0 8px 10px rgba(35, 107, 91, 0.18));
    }

    h1 {
      margin: 0;
      font-size: clamp(1.65rem, 4vw, 2.55rem);
      line-height: 1.08;
      font-weight: 900;
    }

    h1 span {
      display: inline-block;
      margin-left: 10px;
      color: var(--pink);
      font-size: 0.66em;
      white-space: nowrap;
    }

    .score {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fff3be;
      border-color: #e5ad24;
      color: #593b00;
      font-size: clamp(1.55rem, 4.2vw, 2.4rem);
      font-weight: 900;
      white-space: nowrap;
    }

    .game {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 250px;
      gap: 18px;
      align-items: stretch;
    }

    .stage,
    .side {
      background: rgba(255, 253, 250, 0.94);
      border: 2px solid rgba(116, 152, 202, 0.32);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .stage {
      padding: clamp(16px, 3vw, 30px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 190px;
      grid-template-rows: auto auto auto 1fr;
      grid-template-areas:
        "prompt prompt"
        "answer answer"
        "message message"
        "letters actions";
      gap: clamp(14px, 2.6vw, 24px);
      min-height: 560px;
    }

    .prompt {
      grid-area: prompt;
      display: grid;
      gap: 12px;
      text-align: center;
    }

    .round {
      display: none;
      color: var(--muted);
      font-size: clamp(1.05rem, 2.2vw, 1.35rem);
      font-weight: 800;
    }

    .hint-box {
      margin: 0 auto;
      width: 100%;
      max-width: 680px;
      min-height: 92px;
      display: grid;
      place-items: center;
      padding: 18px;
      border-radius: 8px;
      background: #f2f8f2;
      border: 2px solid #91d7d0;
      text-align: center;
    }

    .hint-box.waiting {
      background: #fff9e6;
      border-style: dashed;
      color: var(--muted);
    }

    .hint-label {
      margin: 0;
      font-size: clamp(1.85rem, 5.4vw, 3.25rem);
      line-height: 1.25;
      font-weight: 900;
    }

    .answer {
      grid-area: answer;
      display: grid;
      grid-template-columns: repeat(var(--slots), minmax(0, 1fr));
      gap: clamp(8px, 2vw, 14px);
      max-width: 660px;
      width: 100%;
      margin: 0 auto;
    }

    .slot {
      aspect-ratio: 1 / 1;
      min-height: 64px;
      min-width: 0;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 3px solid #9bc4e8;
      background: #ffffff;
      font-size: clamp(2.1rem, 8vw, 4.35rem);
      font-weight: 900;
      line-height: 1;
      touch-action: manipulation;
      user-select: none;
    }

    .slot.filled {
      border-color: var(--primary);
      background: var(--soft-green);
    }

    .message {
      grid-area: message;
      min-height: 20px;
      display: grid;
      place-items: center;
      padding: 8px;
      text-align: center;
      font-size: clamp(1.18rem, 3.3vw, 1.8rem);
      line-height: 1.2;
      font-weight: 900;
      color: var(--primary-dark);
    }

    .message.bad {
      color: var(--bad);
    }

    .message.good {
      color: var(--good);
    }

    .letters {
      grid-area: letters;
      align-self: center;
      display: grid;
      grid-template-columns: repeat(4, minmax(64px, 1fr));
      gap: clamp(10px, 2vw, 16px);
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    .letter {
      min-height: clamp(72px, 11vw, 108px);
      border-radius: 8px;
      background: linear-gradient(180deg, #fff6cf 0%, #ffe3a3 100%);
      border: 3px solid #f1b83f;
      box-shadow: 0 7px 0 var(--gold-dark);
      font-size: clamp(1.85rem, 6.5vw, 3.65rem);
      font-weight: 900;
      transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
      touch-action: manipulation;
    }

    .letter:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 var(--gold-dark);
    }

    .letter.used {
      opacity: 0.28;
      pointer-events: none;
      transform: translateY(5px);
      box-shadow: none;
    }

    .letter:nth-child(2n) {
      background: linear-gradient(180deg, #e8f9ff 0%, #bfeeff 100%);
      border-color: #6ecae6;
      box-shadow: 0 7px 0 #3997b5;
    }

    .letter:nth-child(3n) {
      background: linear-gradient(180deg, #fff0f7 0%, #ffcfe3 100%);
      border-color: #ef86b0;
      box-shadow: 0 7px 0 #c94f7f;
    }

    .letter:nth-child(4n) {
      background: linear-gradient(180deg, #edfff1 0%, #bff0cc 100%);
      border-color: #6fcf8a;
      box-shadow: 0 7px 0 #3c9c5a;
    }

    .actions {
      grid-area: actions;
      align-self: center;
      display: grid;
      grid-template-columns: 1fr;
      grid-auto-rows: minmax(88px, auto);
      gap: 12px;
    }

    .action {
      min-height: 64px;
      border-radius: 8px;
      border: 2px solid transparent;
      font-size: clamp(1.8rem, 4.6vw, 2.8rem);
      font-weight: 1000;
      background: linear-gradient(180deg, #ffffff 0%, #ece8ff 100%);
      border-color: #c2b9ff;
      touch-action: manipulation;
    }

    .action.primary {
      background: linear-gradient(180deg, #287cde 0%, #1d5fb0 100%);
      color: white;
    }

    #hintBtn {
      background: linear-gradient(180deg, #ff6b6b 0%, #d9273e 100%);
      border-color: #b9182d;
      color: white;
    }

    .action.warn {
      background: var(--soft-red);
      color: #7d321d;
      border-color: #edb79f;
    }

    .side {
      padding: 16px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .mode-list {
      display: grid;
      gap: 10px;
    }

    .mode {
      min-height: 58px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #f3efe6;
      border: 2px solid transparent;
      font-size: clamp(1.45rem, 3.2vw, 2rem);
      font-weight: 900;
      text-align: center;
      display: grid;
      place-items: center;
      line-height: 1.22;
      touch-action: manipulation;
      user-select: none;
    }

    .mode:nth-child(2) {
      background: #fff1da;
    }

    .mode:nth-child(3) {
      background: #edf9ee;
    }

    .mode.active {
      background: #e8f4ff;
      border-color: #4a90e2;
      color: #16427f;
    }

    .water-card {
      position: relative;
      overflow: hidden;
      min-height: 92px;
      color: #114762;
      background: linear-gradient(180deg, #ffffff 0%, #effcff 100%);
      border: 3px solid #72bfdc;
    }

    .water-card::before,
    .water-card::after {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      height: var(--fill);
      bottom: 0;
      background: linear-gradient(180deg, rgba(117, 211, 242, 0.8) 0%, rgba(48, 161, 219, 0.82) 100%);
      transition: height 750ms ease;
      z-index: 0;
    }

    .water-card::after {
      left: -25%;
      bottom: calc(var(--fill) - 12px);
      width: 150%;
      height: 34px;
      background:
        radial-gradient(ellipse at 25% 45%, rgba(255, 255, 255, 0.62) 0%, rgba(255, 255, 255, 0.38) 32%, transparent 66%),
        radial-gradient(ellipse at 70% 55%, rgba(255, 255, 255, 0.46) 0%, rgba(255, 255, 255, 0.24) 30%, transparent 68%);
      border-radius: 48% 52% 46% 54%;
      animation: slosh 2.1s ease-in-out infinite;
      transition: bottom 750ms ease;
    }

    .water-card span {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      min-height: 68px;
      text-align: center;
      line-height: 1.25;
      font-size: clamp(1.65rem, 3.5vw, 2.25rem);
      font-weight: 1000;
    }

    @keyframes slosh {
      0%, 100% {
        transform: translateX(0) rotate(-2deg);
      }
      50% {
        transform: translateX(8%) rotate(2deg);
      }
    }

    .celebrate {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(36, 49, 47, 0.34);
      z-index: 10;
      padding: 18px;
    }

    .celebrate.show {
      display: grid;
    }

    .dialog {
      width: min(100%, 520px);
      padding: 28px;
      text-align: center;
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      border: 2px solid var(--line);
    }

    .dialog h2 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 8vw, 3.8rem);
      line-height: 1.1;
    }

    .dialog p {
      margin: 0 0 22px;
      font-size: clamp(1.2rem, 4vw, 1.75rem);
      font-weight: 800;
      line-height: 1.35;
    }

    .dialog button {
      width: 100%;
      min-height: 70px;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      font-size: 1.45rem;
      font-weight: 900;
    }

    @media (max-width: 900px) {
      .app {
        padding: 12px;
      }

      .game {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: 0;
      }

      .side {
        order: -1;
      }

      .mode-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .mode {
        text-align: center;
        font-size: clamp(1.1rem, 3.8vw, 1.65rem);
      }

    }

    @media (max-width: 760px) {
      .stage {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto 1fr auto;
        grid-template-areas:
          "prompt"
          "answer"
          "message"
          "letters"
          "actions";
      }

      .actions {
        grid-template-columns: 1fr;
        grid-auto-rows: auto;
      }
    }

    @media (min-width: 901px) and (max-width: 1180px) {
      .app {
        padding: 14px;
      }

      .game {
        grid-template-columns: minmax(0, 1fr) 220px;
        gap: 14px;
      }

      .stage {
        padding: 20px;
      }

      .side {
        padding: 14px;
      }

      .mode {
        font-size: 1.05rem;
      }
    }

    @media (max-width: 420px) {
      .topbar {
        align-items: flex-start;
      }

      .mark {
        width: 46px;
        height: 46px;
      }

      .score {
        padding: 8px 10px;
      }

      .letters {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .letter {
        min-height: 68px;
      }

      .slot {
        min-height: 58px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <svg class="mark" viewBox="0 0 80 80" aria-hidden="true">
          <circle cx="40" cy="40" r="35" fill="#f5c15f"/>
          <path d="M40 17c6 12 16 18 29 19-10 8-15 18-14 31-10-7-20-8-32-3 4-12 2-22-7-32 13 1 21-4 24-15Z" fill="#236b5b"/>
          <circle cx="40" cy="40" r="11" fill="#fffdfa"/>
          <path d="M32 43c5 6 12 6 17 0" fill="none" stroke="#24312f" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <h1>한글 낱말 맞추기</h1>
      </div>
      <div class="score" aria-live="polite">점수 <span id="score">0</span></div>
    </header>

    <section class="game" aria-label="한글 낱말 맞추기 게임">
      <section class="stage">
        <div class="prompt">
          <div class="round" id="round">1번째 낱말</div>
          <div class="hint-box waiting" id="hintBox">
            <p class="hint-label" id="hintText">힌트가 필요하면 아래 힌트 버튼을 눌러보세요</p>
          </div>
        </div>

        <div class="answer" id="answer" aria-label="선택한 글자"></div>
        <div class="message" id="message" aria-live="assertive"></div>
        <div class="letters" id="letters" aria-label="고를 수 있는 글자"></div>

        <div class="actions">
          <button class="action" id="backBtn" type="button">한 글자 채우기</button>
          <button class="action" id="hintBtn" type="button">힌트</button>
          <button class="action primary" id="nextBtn" type="button">다음 문제</button>
        </div>
      </section>

      <aside class="side" aria-label="스테이지 정보">
        <div class="mode-list" id="modes"></div>
      </aside>
    </section>
  </main>

  <div class="celebrate" id="celebrate" role="dialog" aria-modal="true" aria-labelledby="doneTitle">
    <div class="dialog">
      <h2 id="doneTitle">참 잘했어요!</h2>
      <p id="doneText"></p>
      <button id="againBtn" type="button">다음 스테이지</button>
    </div>
  </div>

  <script>
    const extraLetters = ["각", "곁", "덧", "록", "묵", "복", "삭", "엽", "욱", "잣", "척", "탑", "팥", "협", "흙", "늦"];
    const roundCount = 15;
    const saveKey = "hangul-word-game-progress-v1";
    const dictionaryUrl = "https://gitlab.com/tdulcet/compact-dictionary/-/raw/main/wiktionary/dictionary-ko.json?inline=false";
    let dictionaryLoaded = false;

    const wordBank = [
      { word: "사과", hint: "빨갛거나 초록색인 달콤한 과일이에요.", minStage: 1 },
      { word: "시계", hint: "시간을 알려주는 물건이에요.", minStage: 1 },

    function speak(text) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "ko-KR";
      utterance.rate = 0.82;
      utterance.pitch = 1;

    }

    function playBell() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      const context = new AudioContext();
      const notes = [
        { frequency: 659.25, start: 0 },
        { frequency: 783.99, start: 0.18 },
        { frequency: 987.77, start: 0.36 }
      ];

      notes.forEach(({ frequency, start }) => {
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        const startTime = context.currentTime + start;
        const endTime = startTime + 0.42;

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(frequency, startTime);
        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(0.18, startTime + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.0001, endTime);

        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start(startTime);
        oscillator.stop(endTime);
      });

      setTimeout(() => context.close(), 1100);
    }

    function playWrongBell() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      const context = new AudioContext();
      const oscillator = context.createOscillator();
      const gain = context.createGain();
      const startTime = context.currentTime;
      const endTime = startTime + 0.45;

      oscillator.type = "triangle";
      oscillator.frequency.setValueAtTime(220, startTime);
      oscillator.frequency.exponentialRampToValueAtTime(146.83, endTime);
      gain.gain.setValueAtTime(0.0001, startTime);
      gain.gain.exponentialRampToValueAtTime(0.16, startTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, endTime);

      oscillator.connect(gain);
      gain.connect(context.destination);
      oscillator.start(startTime);
      oscillator.stop(endTime);

      setTimeout(() => context.close(), 700);
    }

      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function wordLength(word) {
      return [...word].length;
    }

    function isHardWord(item) {
      return item.idiom || item.hard || item.loanword || item.type === "proper";
    }

    function getHardWeight(stage) {
      if (stage < 3) return 0;
      if (stage === 3) return 1;
      if (stage === 4) return 2;
      if (stage === 5) return 4;
      if (stage === 6) return 6;
      return 9;
    }

    function getDictionaryHint(pos, length) {
      if (pos.includes("adverb")) return `${length}글자 부사예요.`;
      if (pos.includes("proper noun")) return `${length}글자 고유명사예요.`;
      if (pos.includes("noun")) return `${length}글자 명사예요.`;
      return `사전에서 가져온 ${length}글자 낱말이에요.`;
    }

    async function loadDictionaryWords() {
      if (dictionaryLoaded) return;
      dictionaryLoaded = true;
      els.message.textContent = "큰 사전을 불러오는 중이에요";

      try {
        const response = await fetch(dictionaryUrl);
        if (!response.ok) throw new Error("dictionary download failed");
        const text = await response.text();
        const existing = new Set(wordBank.map((item) => item.word));
        const lines = text.split("\n");

        lines.forEach((line) => {
          if (!line) return;

          try {
            const entry = JSON.parse(line);
            const word = entry[""];
            const pos = Array.isArray(entry.p) ? entry.p : [];
            const length = typeof word === "string" ? wordLength(word) : 0;

            if (!word || existing.has(word)) return;
            if (!/^[가-힣]+$/.test(word)) return;
            if (length < 2 || length > 5) return;
            if (!pos.some((item) => ["noun", "proper noun", "adverb"].includes(item))) return;

            existing.add(word);
            wordBank.push({
              word,
              hint: getDictionaryHint(pos, length),
              minStage: length <= 3 ? 3 : 4,
              type: pos.includes("adverb") ? "adverb" : pos.includes("proper noun") ? "proper" : "dictionary"
            });
          } catch {
            // Skip malformed dictionary rows.
          }
        });
      } catch {
        els.message.textContent = "사전을 못 불러와서 기본 단어로 시작해요";
      }
    }

    function getStagePlan(stage) {
      if (stage === 1) {
        return { title: "쉬움", note: "쉬운 2글자와 3글자 낱말", lengths: [2, 2, 3, 2, 3], idioms: false };
      }
      if (stage === 2) {
        return { title: "조금 쉬움", note: "3글자 낱말이 조금 더 많아요", lengths: [2, 3, 3, 2, 3], idioms: false };
      }
      if (stage === 3) {
        return { title: "보통", note: "어려운 낱말이 조금씩 섞여요", lengths: [2, 2, 2, 3, 3, 3, 4, 4, 4, 4], idioms: true, loanwords: true };
      }
      if (stage === 4) {
        return { title: "조금 어려움", note: "어려운 표현이 더 자주 나와요", lengths: [2, 2, 2, 3, 3, 3, 4, 4, 4, 4], idioms: true, loanwords: true };
      }
      if (stage === 5) {
        return { title: "어려움", note: "사자성어 비중이 높아져요", lengths: [2, 2, 3, 3, 3, 4, 4, 4, 4, 4], idioms: true, loanwords: true };
      }
      if (stage === 6) {
        return { title: "도전", note: "어려운 4글자가 중심이에요", lengths: [2, 3, 3, 4, 4, 4, 4, 4], idioms: true, loanwords: true };
      }
      return { title: "높은 도전", note: "사자성어와 긴 낱말이 많아요", lengths: [4, 5, 4, 3, 4, 5], idioms: true, loanwords: true };
    }

    function getWordPool(stage, length) {
      const plan = getStagePlan(stage);
      const pool = wordBank.filter((item) => {
        if (wordLength(item.word) !== length) return false;
        if (item.minStage > stage) return false;
        if (item.idiom && !plan.idioms) return false;
        if (item.loanword && !plan.loanwords) return false;
        return true;
      });

      if (pool.length > 0) {
        const harderWords = pool.filter(isHardWord);
        const hardWeight = getHardWeight(stage);
        if (hardWeight > 0 && harderWords.length > 0) {
          return [
            ...pool,
            ...Array.from({ length: hardWeight }, () => harderWords).flat()
          ];
        }
        return pool;
      }

      const sameLengthFallback = wordBank.filter((item) => wordLength(item.word) === length && item.minStage <= stage);
      if (sameLengthFallback.length > 0) return sameLengthFallback;

      return wordBank.filter((item) => {
        if (item.minStage > stage) return false;
        if (item.idiom && !plan.idioms) return false;
        if (item.loanword && !plan.loanwords) return false;
        return true;
      });
    }

    function buildRounds(stage) {
      const plan = getStagePlan(stage);
      const byLength = {};
      const picksUsed = {};
      const lengthPattern = shuffle(plan.lengths);
      const rounds = [];
      const usedWords = new Set();
      const seenWords = new Set(state.seenWords || []);

      for (let i = 0; i < roundCount; i += 1) {
        const length = lengthPattern[i % lengthPattern.length];
        if (!byLength[length]) {
          byLength[length] = shuffle(getWordPool(stage, length));
          picksUsed[length] = 0;
        }

        const pool = byLength[length];
        if (pool.length === 0) continue;
        if (picksUsed[length] >= pool.length) {
          byLength[length] = shuffle(pool);
          picksUsed[length] = 0;
        }
        let nextItem = null;

        while (picksUsed[length] < pool.length) {
          const candidate = pool[picksUsed[length]];
          picksUsed[length] += 1;
          if (!usedWords.has(candidate.word) && !seenWords.has(candidate.word)) {
            nextItem = candidate;
            break;
          }
        }

        if (!nextItem) {
          nextItem = shuffle(wordBank.filter((item) => {
            if (item.minStage > stage) return false;
            if (item.idiom && !plan.idioms) return false;
            if (item.loanword && !plan.loanwords) return false;
            return !usedWords.has(item.word) && !seenWords.has(item.word);
          }))[0];
        }

        if (!nextItem) {
          nextItem = shuffle(wordBank.filter((item) => {
            if (wordLength(item.word) !== length) return false;
            return !usedWords.has(item.word) && !seenWords.has(item.word);
          }))[0];
        }

        if (!nextItem) {
          nextItem = shuffle(wordBank.filter((item) => {
            return !usedWords.has(item.word) && !seenWords.has(item.word);
          }))[0];
        }

        if (!nextItem) break;
        rounds.push(nextItem);
        usedWords.add(nextItem.word);
      }

      return rounds;
    }

    function rememberRoundWords() {
      const seenWords = new Set(state.seenWords || []);
      state.rounds.forEach((item) => seenWords.add(item.word));
      state.seenWords = [...seenWords];
    }

    function getCurrentWord() {
      return state.rounds[state.index];
    }

    function saveProgress() {
      const data = {
        stage: state.stage,
        index: state.index,
        score: state.score,
        totalScore: state.totalScore,
        rounds: state.rounds.map((item) => item.word),
        seenWords: state.seenWords
      };
      localStorage.setItem(saveKey, JSON.stringify(data));
    }

    function loadProgress() {
      try {
        const raw = localStorage.getItem(saveKey);
        if (!raw) return false;

        const data = JSON.parse(raw);
        if (!data || !Array.isArray(data.rounds)) return false;
        if (new Set(data.rounds).size !== data.rounds.length) {
          state.stage = Math.max(1, Number(data.stage) || 1);
          state.totalScore = Math.max(0, Number(data.totalScore) || 0);
          return false;
        }

        const wordsByName = new Map(wordBank.map((item) => [item.word, item]));
        const loadedRounds = data.rounds.map((word) => wordsByName.get(word)).filter(Boolean);
        if (loadedRounds.length !== roundCount) return false;

        state.stage = Math.max(1, Number(data.stage) || 1);
        state.index = Math.min(Math.max(0, Number(data.index) || 0), roundCount - 1);
        state.score = Math.max(0, Number(data.score) || 0);
        state.totalScore = Math.max(0, Number(data.totalScore) || 0);
        state.rounds = loadedRounds;
        state.seenWords = Array.isArray(data.seenWords)
          ? [...new Set(data.seenWords.filter((word) => typeof word === "string"))]
          : [...new Set(data.rounds)];
        rememberRoundWords();
        saveProgress();
        return true;
      } catch {
        return false;
      }
    }

    function makeChoices(item) {
      const answerChars = [...item.word];
      const choices = [...answerChars];
      const used = new Set(answerChars);
      const preferredDecoys = shuffle(item.decoys || []);
      const fallbackDecoys = shuffle(extraLetters);

      [...preferredDecoys, ...fallbackDecoys].forEach((letter) => {
        if (choices.length >= 8 || used.has(letter)) return;
        choices.push(letter);
        used.add(letter);
      });

      return shuffle(choices).map((char, index) => ({
        id: `${char}-${index}-${Math.random().toString(36).slice(2)}`,
        char
      }));
    }

    function renderModes() {
      els.modes.innerHTML = "";
      const plan = getStagePlan(state.stage);
      const levelCard = document.createElement("div");
      levelCard.className = "mode active";
      levelCard.textContent = plan.title;

      const noteCard = document.createElement("div");
      noteCard.className = "mode";
      noteCard.textContent = plan.note;

      const progressCard = document.createElement("div");
      progressCard.className = "mode water-card";
      progressCard.style.setProperty("--fill", `${Math.round((state.index / roundCount) * 100)}%`);

      const progressText = document.createElement("span");
      progressText.textContent = `${state.index}/${roundCount}`;
      progressCard.append(progressText);

      els.modes.append(levelCard, noteCard, progressCard);
    }

    function startRounds() {
      state.index = 0;
      state.selected = [];
      state.locked = false;
      state.hintOpen = false;
      state.score = 0;
      state.rounds = buildRounds(state.stage);
      rememberRoundWords();
      saveProgress();
      renderModes();
      render();
    }

    async function resumeOrStart() {
      await loadDictionaryWords();

      if (!loadProgress()) {
        startRounds();
        return;
      }

      state.selected = [];
      state.locked = false;
      state.hintOpen = false;
      renderModes();
      render();
    }

    function render() {
      const item = getCurrentWord();
      const chars = [...item.word];

      state.selected = Array(chars.length).fill(null);
      state.locked = false;
      state.hintOpen = false;
      state.choices = makeChoices(item);

      els.answer.style.setProperty("--slots", chars.length);
      els.hintBox.classList.add("waiting");
      els.round.textContent = `${state.stage}스테이지 · ${state.index + 1}/${roundCount} · ${chars.length}글자`;
      els.hintText.textContent = `${state.stage}스테이지 · ${state.index + 1}/${roundCount} · ${chars.length}글자`;
      els.message.className = "message";
      els.message.textContent = "";
      els.score.textContent = String(state.totalScore);
      renderModes();

      els.answer.innerHTML = "";
      chars.forEach((char, index) => {
        const slot = document.createElement("button");
        slot.type = "button";
        slot.className = "slot";
        slot.setAttribute("aria-label", `${index + 1}번째 칸 비우기`);
        slot.addEventListener("click", () => clearSlot(index));
        els.answer.append(slot);
      });

      renderLetters();
    }

    function renderLetters() {
      els.letters.innerHTML = "";
      state.choices.forEach((choice) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "letter";
        button.textContent = choice.char;
        button.dataset.id = choice.id;
        button.setAttribute("aria-label", `${choice.char} 글자 선택`);
        button.addEventListener("click", () => selectLetter(button, choice));
        els.letters.append(button);
      });
    }

    function selectLetter(button, choice) {
      if (state.locked) return;
      const item = getCurrentWord();
      const emptyIndex = state.selected.findIndex((slot) => !slot);
      if (emptyIndex === -1) return;

      state.selected[emptyIndex] = { char: choice.char, button };
      button.classList.add("used");
      updateSlots();

      if (state.selected.every(Boolean)) {
        checkAnswer();
      }
    }

    function updateSlots() {
      const slots = [...els.answer.children];
      slots.forEach((slot, index) => {
        const selected = state.selected[index];
        slot.textContent = selected ? selected.char : "";
        slot.classList.toggle("filled", Boolean(selected));
        slot.setAttribute("aria-label", selected ? `${selected.char} 글자 비우기` : `${index + 1}번째 빈칸`);
      });
    }

    function clearSlot(index) {
      if (state.locked || !state.selected[index]) return;
      state.selected[index].button.classList.remove("used");
      state.selected[index] = null;
      updateSlots();
      els.message.className = "message";
      els.message.textContent = "글자를 지웠어요";
    }

    function checkAnswer() {
      const answer = state.selected.map((item) => item ? item.char : "").join("");
      const correct = getCurrentWord().word;

      if (answer === correct) {
        state.locked = true;
        const points = state.hintOpen ? 8 : 10;
        state.score += points;
        state.totalScore += points;
        els.score.textContent = String(state.totalScore);
        els.message.className = "message good";
        els.message.textContent = "딩동댕";
        playBell();
        setTimeout(() => speak("형자 맞췄어요"), 520);
        setTimeout(nextWord, 1500);
        return;
      }

      els.message.className = "message bad";
      els.message.textContent = "다시 해볼까요?";
      playWrongBell();
      setTimeout(clearAnswer, 900);
    }

    function clearAnswer() {
      state.selected.forEach((item) => {
        if (item) item.button.classList.remove("used");
      });
      state.selected = Array(wordLength(getCurrentWord().word)).fill(null);
      state.locked = false;
      updateSlots();
      els.message.className = "message";
      els.message.textContent = "천천히 다시 골라보세요";
    }

    function fillOneLetter() {
      if (state.locked || state.selected.every(Boolean)) return;
      const answerChars = [...getCurrentWord().word];
      const emptyIndexes = state.selected
        .map((item, index) => item ? null : index)
        .filter((index) => index !== null);
      const shuffledIndexes = shuffle(emptyIndexes);
      let filled = false;

      for (const index of shuffledIndexes) {
        const char = answerChars[index];
        const button = [...els.letters.querySelectorAll(".letter")]
          .find((letterButton) => !letterButton.classList.contains("used") && letterButton.textContent === char);

        if (button) {
          state.selected[index] = { char, button };
          button.classList.add("used");
          filled = true;
          break;
        }

        const misplacedIndex = state.selected.findIndex((item, itemIndex) => {
          return item && item.char === char && answerChars[itemIndex] !== char;
        });

        if (misplacedIndex === -1) continue;

        const misplaced = state.selected[misplacedIndex];
        state.selected[misplacedIndex] = null;
        state.selected[index] = misplaced;
        filled = true;
        break;
      }

      if (!filled) {
        clearAnswer();
        setTimeout(fillOneLetter, 0);
        return;
      }

      updateSlots();
      els.message.className = "message";
      els.message.textContent = "정답 자리에 채웠어요";

      if (state.selected.every(Boolean)) {
        checkAnswer();
      }
    }

    function nextWord() {
      if (state.index + 1 >= roundCount) {
        showDone();
        return;
      }

      state.index += 1;
      saveProgress();
      render();
    }

    function showDone() {
      renderModes();
      els.doneText.textContent = `${state.stage}스테이지에서 ${state.score}점을 모았어요. 다음 스테이지로 가볼까요?`;
      els.celebrate.classList.add("show");
      speak("형자 참 잘했어요");
    }

    function restart() {
      state.stage += 1;
      els.celebrate.classList.remove("show");
      startRounds();
    }

    function showHint() {
      const item = getCurrentWord();
      state.hintOpen = true;
      els.hintBox.classList.remove("waiting");
      els.hintText.textContent = item.hint;
      els.message.className = "message";
      els.message.textContent = `${wordLength(item.word)}글자 낱말이에요`;
      speak(`힌트. ${item.hint}`);
    }

    els.backBtn.addEventListener("click", fillOneLetter);
    els.hintBtn.addEventListener("click", showHint);
    els.nextBtn.addEventListener("click", nextWord);
    els.againBtn.addEventListener("click", restart);

    resumeOrStart();
  </script>
</body>
</html>
